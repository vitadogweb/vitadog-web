<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vitadog</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #eae3d2;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Georgia', serif; 
            color: #2c2519;
            position: relative;
        }

        .pantalla-centrada {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            margin-bottom: 50px;
        }

        .libro-contenedor {
            width: 100%;
            background-color: #fcfaf2;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }

        @media (max-width: 480px) {
            .libro-contenedor { padding: 25px 15px; }
            .pantalla-centrada { top: 2%; width: 95%; }
        }

        .portada-seccion {
            width: 100%;
            margin: 0 auto 20px auto;
            text-align: center;
        }

        h1 { 
            font-size: 3.5rem;
            color: #5c3a21; 
            margin: 0 0 5px 0;
            font-style: italic;
            letter-spacing: 2px;
        }

        .subtitulo {
            font-size: 1.1rem;
            color: #8c765c;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 25px 0;
        }

        .imagen-portada-wrapper {
            width: 100%;
            max-width: 250px;
            margin: 0 auto 30px auto;
            border: 6px solid #fcfaf2;
            outline: 1px solid #b5a489;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border-radius: 4px;
            overflow: hidden;
        }

        .imagen-portada-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .buscador { 
            display: block;
            width: 100%;
            max-width: 450px;
            margin: 0 auto 25px auto;
        }

        input { 
            padding: 14px 18px; 
            font-size: 16px; 
            font-family: 'Georgia', serif;
            border: 1px solid #b5a489; 
            border-radius: 4px; 
            width: 100%;
            box-sizing: border-box;
            background-color: #fffdf9;
            text-align: center;
            margin-bottom: 12px;
        }

        button { 
            padding: 14px 28px; 
            font-size: 16px; 
            font-family: 'Georgia', serif;
            background-color: #5c3a21; 
            color: #fcfaf2; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%;
        }

        @media (min-width: 520px) {
            input { width: 65%; display: inline-block; margin-bottom: 0; margin-right: 2%; }
            button { width: 32%; display: inline-block; vertical-align: top; }
            .buscador { max-width: 500px; }
        }

        button:hover { background-color: #412817; }

        .contenedor-abecedario {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 650px;
            margin: 0 auto 20px auto;
            padding: 10px;
            border-top: 1px dashed #e0d7c1;
            border-bottom: 1px dashed #e0d7c1;
        }

        .letra-btn {
            background-color: #fffdf9;
            color: #5c3a21;
            border: 1px solid #b5a489;
            border-radius: 3px;
            padding: 6px 10px;
            font-size: 14px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 32px;
        }

        .letra-btn:hover, .letra-btn.activa {
            background-color: #5c3a21;
            color: #fcfaf2;
            border-color: #5c3a21;
            transform: translateY(-1px);
        }

        #anclaResultados {
            display: block;
            position: relative;
            top: -20px;
            visibility: hidden;
        }

        .resultados-seccion {
            margin-top: 10px;
            width: 100%;
            text-align: left;
        }

        .grid-resultados {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 100%;
        }

        .ficha-animal {
            background: rgba(255,255,255,0.5);
            border: 1px solid #e0d7c1;
            padding: 25px;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .raza-link {
            color: #5c3a21;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .raza-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        .camara-icono {
            font-size: 14px;
            margin-left: 8px;
            opacity: 0.7;
        }

        .origen-etiqueta {
            font-style: italic;
            color: #8c765c;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .propiedad-libro {
            margin: 10px 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .propiedad-libro strong { color: #412817; }

        .paginacion { 
            display: none; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0d7c1;
            width: 100%;
        }

        .btn-pag { 
            background-color: #8c765c; 
            padding: 10px 20px;
            font-size: 14px;
            width: auto;
        }
        .btn-pag:hover { background-color: #5c3a21; }
        .btn-pag:disabled { background-color: #d1c7b7; cursor: not-allowed; }
        #infoPagina { font-style: italic; color: #5c3a21; font-size: 15px; }
    </style>
</head>
<body>

    <div class="pantalla-centrada">
        <div class="libro-contenedor">
            
            <!-- Portada -->
            <div class="portada-seccion">
                <h1>vitadog</h1>
                <div class="subtitulo">Enciclopedia Canina Universal</div>
                
                <div class="imagen-portada-wrapper">
                    <img src="/static/portada.jpg" onerror="this.onerror=null; this.src='https://unsplash.com';" alt="Portada">
                </div>

                <!-- Buscador -->
                <div class="buscador">
                    <input type="text" id="inputPais" placeholder="Buscar por país...">
                    <button onclick="buscarPorTexto()">Consultar Tomo</button>
                </div>

                <!-- Abecedario -->
                <div class="contenedor-abecedario" id="abcContenedor"></div>
            </div>

            <!-- Ancla de Scroll -->
            <div id="anclaResultados"></div>

            <!-- Resultados -->
            <div class="resultados-seccion">
                <div class="grid-resultados" id="tablaResultados"></div>
            </div>

            <!-- Paginación -->
            <div class="paginacion" id="bloquePaginacion">
                <button id="btnAnterior" class="btn-pag" onclick="cambiarPagina(-1)" disabled>← Anterior</button>
                <span id="infoPagina">Página 1</span>
                <button id="btnSiguiente" class="btn-pag" onclick="cambiarPagina(1)">Siguiente →</button>
            </div>

        </div>
    </div>

    <!-- FORMULARIO INVISIBLE IMPRESCINDIBLE PARA PREVENIR ERRORES DE CACHÉ DE URL -->
    <form id="formGoogleImagenes" action="https://google.com" method="GET" target="_blank" style="display:none;">
        <input type="hidden" name="q" id="queryGoogle">
        <input type="hidden" name="tbm" value="isch">
    </form>

    <script>
        let paginaActual = 1;
        let letraSeleccionada = '';

        function inicializarAbecedario() {
            const contenedor = document.getElementById('abcContenedor');
            const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            
            letras.forEach(letra => {
                const boton = document.createElement('button');
                boton.innerText = letra;
                boton.className = 'letra-btn';
                boton.onclick = () => buscarPorLetter(letra, boton);
                contenedor.appendChild(boton);
            });
        }

        function buscarPorTexto() {
            letraSeleccionada = ''; 
            quitarLetrasActivas();
            paginaActual = 1;
            cargarDatos(true, false); 
        }

        function buscarPorLetter(letra, botonEstilo) {
            document.getElementById('inputPais').value = ''; 
            letraSeleccionada = letra;
            paginaActual = 1;
            
            quitarLetrasActivas();
            botonEstilo.classList.add('activa'); 
            
            cargarDatos(true, true); 
        }

        function quitarLetrasActivas() {
            document.querySelectorAll('.letra-btn').forEach(btn => btn.classList.remove('activa'));
        }

        function cambiarPagina(direccion) {
            paginaActual += direccion;
            cargarDatos(true, true); 
        }

        // SOLUCIÓN TOTAL: Rellena el formulario nativo oculto y simula el click del botón Enter de Google
        function abrirGaleria(nombreRaza) {
            const inputOculto = document.getElementById('queryGoogle');
            const formulario = document.getElementById('formGoogleImagenes');
            
            // Seteamos el texto exacto con la palabra "dog" para refinar el buscador
            inputOculto.value = nombreRaza + " dog";
            
            // Envía la petición simulando el "Enter" del teclado de forma 100% nativa
            formulario.submit();
        }

        async function cargarDatos(esBusqueda = false, requiereScroll = false) {
            const contenedor = document.getElementById('tablaResultados');
            const paginacion = document.getElementById('bloquePaginacion');
            const pais = document.getElementById('inputPais').value;

            if (!esBusqueda) {
                contenedor.innerHTML = '';
                paginacion.style.display = 'none';
                return;
            }

            try {
                let url = `/buscar?pagina=${paginaActual}`;
                if (letraSeleccionada) {
                    url += `&letra=${letraSeleccionada}`;
                } else {
                    url += `&pais=${encodeURIComponent(pais)}`;
                }

                const respuesta = await fetch(url);
                const datos = await respuesta.json();
                
                contenedor.innerHTML = ''; 
                paginacion.style.display = 'flex'; 

                if (datos.error) {
                    alert('Error en el tomo: ' + datos.error);
                    return;
                }

                if (datos.length === 0) {
                    contenedor.innerHTML = '<div style="grid-column: 1/-1; text-align:center; font-style: italic; color: #8c765c; padding: 40px;">Fin de las crónicas. No se hallaron razas.</div>';
                    document.getElementById('btnSiguiente').disabled = true;
                } else {
                    datos.forEach(perro => {
                        const nombreRaza = perro.nombre_raza || 'Raza Desconocida';
                        const nombreLimpio = nombreRaza.replace(/'/g, "\\'");

                        const ficha = `
                            <div class="ficha-animal">
                                <h3>
                                    <span class="raza-link" style="cursor:pointer;" onclick="abrirGaleria('${nombreLimpio}')" title="Ver fotos de ${nombreRaza}">
                                        ${nombreRaza} <span class="camara-icono">📷</span>
                                    </span>
                                </h3>
                                <div class="origen-etiqueta">Región de Origen: ${perro.nombre_pais || 'No especificado'}</div>
                                <div class="propiedad-libro"><strong>Fisionomía:</strong> ${perro.caracteristicas_fisicas || 'Sin registros.'}</div>
                                <div class="propiedad-libro"><strong>Temperamento:</strong> ${perro.caracteristicas_psicologicas || 'Sin registros.'}</div>
                                <div class="propiedad-libro"><strong>Patologías comunes:</strong> <i>${perro.enfermedades_comunes || 'Ninguna descrita.'}</i></div>
                            </div>
                        `;
                        contenedor.innerHTML += ficha;
                    });
                    document.getElementById('btnSiguiente').disabled = datos.length < 20;
                }

                if (requiereScroll) {
                    document.getElementById('anclaResultados').scrollIntoView({ behavior: 'smooth' });
                }

                document.getElementById('infoPagina').innerText = `Página ${paginaActual}`;
                document.getElementById('btnAnterior').disabled = paginaActual === 1;

            } catch (error) {
                console.error('Error de lectura en el servidor:', error);
            }
        }

        window.onload = function() {
            inicializarAbecedario();
            cargarDatos(false);
        };
    </script>
</body>
</html>
